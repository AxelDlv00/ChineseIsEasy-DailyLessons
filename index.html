<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liseuse de Leçons</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>📚 Sommaire</h2>
                <button id="close-sidebar" class="icon-btn" title="Fermer le panneau">✕</button>
            </div>
            <ul id="lesson-list">
                <li style="opacity: 0.5;">Chargement des leçons...</li>
            </ul>
        </nav>

        <main class="content">
            <div class="top-bar">
                <button id="open-sidebar" class="menu-btn">☰ Menu</button>
            </div>
            
            <div id="lesson-container" class="card hidden">
                <div id="md-content" class="markdown-body"></div>
            </div>
            
            <div id="welcome-message" class="card description">
                <h2>Bienvenue 👋</h2>
                <p>Sélectionnez une leçon dans le menu latéral pour commencer votre apprentissage.</p>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
